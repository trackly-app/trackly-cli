name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    # Gate: (a) the body must mention `@claude`, AND (b) the TRIGGERING PRINCIPAL (not the
    # surrounding issue/PR opener) must be Kevin or have OWNER/MEMBER/COLLABORATOR
    # association. Each event type's author_association is scoped to its own principal:
    #   - issue_comment               → comment.author_association (commenter)
    #   - pull_request_review_comment → comment.author_association (commenter)
    #   - pull_request_review         → review.author_association (reviewer)
    #   - issues                      → issue.author_association (opener == triggering actor)
    # Codex P1 on PR #21: previously OR'd ALL association fields together, which let any
    # external commenter pass via issue.author_association (the opener's field) on an
    # OWNER-authored issue. Explicit per-event binding closes that bypass.
    if: |
      (
        (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude') && (github.actor == 'kevinastuhuaman' || github.event.comment.author_association == 'OWNER' || github.event.comment.author_association == 'MEMBER' || github.event.comment.author_association == 'COLLABORATOR')) ||
        (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude') && (github.actor == 'kevinastuhuaman' || github.event.comment.author_association == 'OWNER' || github.event.comment.author_association == 'MEMBER' || github.event.comment.author_association == 'COLLABORATOR')) ||
        (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude') && (github.actor == 'kevinastuhuaman' || github.event.review.author_association == 'OWNER' || github.event.review.author_association == 'MEMBER' || github.event.review.author_association == 'COLLABORATOR')) ||
        (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')) && (github.actor == 'kevinastuhuaman' || github.event.issue.author_association == 'OWNER' || github.event.issue.author_association == 'MEMBER' || github.event.issue.author_association == 'COLLABORATOR'))
      )
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      API_FORCE_IDLE_TIMEOUT: "1"
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          fetch-depth: 1

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@6e2bd52842c65e914eba5c8badd17560bd26b5de # v1
        with:
          settings: |
            {"env": {"API_FORCE_IDLE_TIMEOUT": "1"}}
          use_bedrock: "true"
          additional_permissions: |
            actions: read
          claude_args: '--model us.anthropic.claude-opus-4-6-v1'
