name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Default to read-only for everything; only the publish + auto-release workflows
# need write permissions and they set them explicitly at the job level.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # Pinned to commit SHA to prevent supply-chain attacks via tag re-pointing.
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: 20

      - run: npm ci

      - run: npm audit --audit-level=high

      - run: npm test

      - name: Package smoke test
        run: npm pack --dry-run

      - name: Notify Slack on failure
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_TRACKLY_CRITICAL }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          SAFE_MSG=$(echo "$COMMIT_MSG" | head -1)
          BODY=":red_circle: *CI Failed* — \`${{ github.repository }}\`\n*Branch:* \`${{ github.ref_name }}\`\n*Commit:* \`${SHORT_SHA}\` — ${SAFE_MSG}\n*Run:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View failed run>"
          PAYLOAD=$(jq -n --arg text "$BODY" '{
            text: $text,
            blocks: [{ type: "section", text: { type: "mrkdwn", text: $text } }]
          }')
          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            curl -sfS -X POST "$SLACK_WEBHOOK_URL" \
              -H 'Content-Type: application/json' \
              -d "$PAYLOAD" || true
          fi
