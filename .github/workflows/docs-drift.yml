name: Docs Drift Check

# Validates that README, docs, and server.json stay in sync with actual
# CLI commands (bin/trackly) and MCP tools (mcp/server.js).
# Catches documentation drift before it reaches main.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check-docs:
    runs-on: ubuntu-latest

    steps:
      # Pinned to commit SHA to prevent supply-chain attacks via tag re-pointing.
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: 20

      # MCP-tool documentation coverage. Replaces the old grep-based extraction,
      # which silently extracted ZERO tools (server.tool( and the name literal are
      # on separate lines and grep is line-oriented) and therefore never failed —
      # that is how the 11th tool reached main undocumented. The test cross-checks
      # the extracted count against the raw server.tool( count and verifies each
      # tool appears in the README table AND docs/trackly-tools.md.
      - name: Check MCP tools are documented (README + docs/trackly-tools.md)
        run: node --test test/docs-coverage.test.js

      - name: Check all CLI commands are documented
        run: |
          # Extract command names from bin/trackly case statements
          COMMANDS=$(grep "case '" bin/trackly | grep -oP "(?<=case ')[^']+")
          MISSING=0

          for cmd in $COMMANDS; do
            # 'mcp' is internal, skip it
            if [ "$cmd" = "mcp" ]; then continue; fi

            if ! grep -q "trackly $cmd" README.md && ! grep -q "trackly ${cmd}" README.md; then
              echo "::warning::CLI command '$cmd' exists in bin/trackly but not documented in README.md"
              MISSING=1
            fi
          done

          if [ "$MISSING" = "1" ]; then
            echo "::error::Undocumented CLI commands found. Update README.md."
            exit 1
          fi
          echo "All CLI commands documented"

      - name: Check server.json version matches package.json
        run: |
          PKG_VER=$(node -p "require('./package.json').version")
          SRV_VER=$(node -p "require('./server.json').version")
          SRV_PKG_VER=$(node -p "require('./server.json').packages[0].version")

          echo "package.json: $PKG_VER"
          echo "server.json version: $SRV_VER"
          echo "server.json packages[0].version: $SRV_PKG_VER"

          FAIL=0
          if [ "$PKG_VER" != "$SRV_VER" ]; then
            echo "::error::package.json ($PKG_VER) != server.json version ($SRV_VER)"
            FAIL=1
          fi
          if [ "$PKG_VER" != "$SRV_PKG_VER" ]; then
            echo "::error::package.json ($PKG_VER) != server.json packages[0].version ($SRV_PKG_VER)"
            FAIL=1
          fi

          if [ "$FAIL" = "1" ]; then
            exit 1
          fi
          echo "All versions in sync"

      - name: Check mcp-publisher pin is in lockstep across publish workflows
        run: |
          # publish.yml and publish-mcp-registry.yml both pin mcp-publisher to a
          # version + SHA256 with a "keep in lockstep" comment. Enforce it so a
          # one-sided edit can't silently drift the two workflows apart.
          PUB=.github/workflows/publish.yml
          REG=.github/workflows/publish-mcp-registry.yml
          PUB_VER=$(grep -m1 'MCP_PUBLISHER_VERSION:' "$PUB" | awk '{print $2}')
          REG_VER=$(grep -m1 'MCP_PUBLISHER_VERSION:' "$REG" | awk '{print $2}')
          PUB_SHA=$(grep -m1 'MCP_PUBLISHER_SHA256_LINUX_AMD64:' "$PUB" | awk '{print $2}')
          REG_SHA=$(grep -m1 'MCP_PUBLISHER_SHA256_LINUX_AMD64:' "$REG" | awk '{print $2}')

          echo "publish.yml:          $PUB_VER / $PUB_SHA"
          echo "publish-mcp-registry: $REG_VER / $REG_SHA"

          if [ -z "$PUB_VER" ] || [ -z "$REG_VER" ] || [ -z "$PUB_SHA" ] || [ -z "$REG_SHA" ]; then
            echo "::error::Could not extract mcp-publisher version/SHA from one or both workflows"
            exit 1
          fi
          if [ "$PUB_VER" != "$REG_VER" ] || [ "$PUB_SHA" != "$REG_SHA" ]; then
            echo "::error::mcp-publisher pin drift between publish.yml and publish-mcp-registry.yml"
            exit 1
          fi
          echo "mcp-publisher pin in lockstep"
