name: Publish

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - run: npm test

      - run: npm audit --audit-level=high

      - run: npm pack --dry-run

      # `--provenance` requires `id-token: write` (set at the job level above). This writes
      # a sigstore attestation to the npm registry linking the tarball to this workflow run.
      # README/CLAUDE.md claimed provenance was active on every publish since 0.1.1, but
      # `npm view trackly-cli@0.2.2 dist.attestations` was empty before this fix — docs shipped
      # ahead of reality. Users who verify attestations with `npm install --attestations` would
      # have seen the failure.
      - name: Publish to npm (with provenance)
        id: npm_publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="$(node -p 'require("./package.json").version')"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          # Query npm for the exact version string using --json so we match against the
          # versions array literally (no substring collisions like 0.2.3 inside 10.2.3).
          EXISTS_BEFORE="$(npm view trackly-cli versions --json 2>/dev/null \
            | node -e 'const v=process.argv[1]; const arr=JSON.parse(require("fs").readFileSync(0,"utf8")||"[]"); process.stdout.write(Array.isArray(arr)&&arr.includes(v)?"true":"false")' "$VERSION")"
          echo "Exists on npm before publish: ${EXISTS_BEFORE}"

          if npm publish --access public --provenance 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          else
            # Publish failed. Confirm it failed because the exact version already existed
            # (not some other error like invalid token, invalid tarball, etc.).
            if [ "${EXISTS_BEFORE}" = "true" ]; then
              echo "Version ${VERSION} already published to npm — skipping publish step"
              echo "published=false" >> "$GITHUB_OUTPUT"
              echo "already_published=true" >> "$GITHUB_OUTPUT"
            else
              echo "::error::npm publish failed and version ${VERSION} is NOT on npm — real failure"
              exit 1
            fi
          fi

      # Post-publish attestation gate. Runs on BOTH paths for the CURRENT version so a
      # partial upload (publish succeeded, attestation didn't land) can't silently ship an
      # unattested tarball on retry.
      #
      # This intentionally fails the workflow for every version ≥ 0.2.3 that lacks attestations.
      # If a pre-0.2.3 version ever needs re-republishing, temporarily skip this step — do NOT
      # weaken the gate for new releases.
      - name: Verify npm attestations (post-publish)
        run: |
          set -euo pipefail
          VERSION="${{ steps.npm_publish.outputs.version }}"
          # Give the registry up to ~30s (3 × 10s) for the attestation to propagate after publish.
          for i in 1 2 3; do
            if npm view "trackly-cli@${VERSION}" dist.attestations --json 2>/dev/null | grep -q '"url"'; then
              echo "✓ Provenance attestations found for trackly-cli@${VERSION}"
              exit 0
            fi
            echo "Attestations not yet visible; waiting 10s (attempt ${i}/3)..."
            sleep 10
          done
          echo "::error::No provenance attestations visible for trackly-cli@${VERSION}"
          echo "::error::If the publish step reported success, the provenance upload failed silently."
          echo "::error::If the version was already on npm without provenance (historical pre-0.2.3 re-runs), update this workflow to temporarily bypass."
          exit 1

      # Pinned to a specific mcp-publisher release + verified SHA256.
      # Previously pulled `releases/latest` piped straight to `tar xz`, which ran any
      # upstream-compromised binary inside this workflow (OIDC token + NPM_TOKEN in scope).
      # To upgrade: update MCP_PUBLISHER_VERSION, fetch the matching line from
      #   https://github.com/modelcontextprotocol/registry/releases/download/v<version>/registry_<version>_checksums.txt
      # and update MCP_PUBLISHER_SHA256_LINUX_AMD64.
      - name: Install mcp-publisher (pinned + SHA256-verified)
        env:
          MCP_PUBLISHER_VERSION: v1.6.0
          MCP_PUBLISHER_SHA256_LINUX_AMD64: 2de4ac3bf5b2aa9b012291a6969f16e4a2e37b70baab7f066e06998823405d42
        run: |
          set -euo pipefail
          # Runner is ubuntu-latest → linux/amd64. Fail loud if that ever changes.
          if [ "$(uname -s)-$(uname -m)" != "Linux-x86_64" ]; then
            echo "::error::mcp-publisher pin only covers linux/amd64; runner is $(uname -s)-$(uname -m)"
            exit 1
          fi
          URL="https://github.com/modelcontextprotocol/registry/releases/download/${MCP_PUBLISHER_VERSION}/mcp-publisher_linux_amd64.tar.gz"
          curl -fsSL --retry 3 -o mcp-publisher.tar.gz "$URL"
          echo "${MCP_PUBLISHER_SHA256_LINUX_AMD64}  mcp-publisher.tar.gz" | sha256sum -c -
          tar xzf mcp-publisher.tar.gz mcp-publisher
          rm mcp-publisher.tar.gz

      - name: Authenticate to MCP Registry
        run: ./mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        run: ./mcp-publisher publish
