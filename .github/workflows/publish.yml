name: Publish

on:
  release:
    types: [published]
  # Also fire on version tag push so auto-release.yml's `git push origin <tag>` triggers a publish
  # even when the Release is created by github-actions[bot]. GITHUB_TOKEN-created Releases do NOT
  # trigger downstream `release:` events (well-known GitHub Actions restriction to prevent
  # workflow recursion). v0.2.6 required a manual release recreate to publish to npm because of
  # this. Tag-push events fire regardless of who pushed.
  # npm's EPUBLISHCONFLICT branch in this workflow already handles the case where both events
  # fire — the second one becomes a no-op without aborting the step.
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      # Pinned to commit SHA to prevent supply-chain attacks via tag re-pointing.
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      # Node 22 is REQUIRED for Trusted Publishing OIDC. The npm CLI 11.5.1+
      # (bundled with Node 22.14+) added the OIDC token-exchange code path used
      # by trusted publishers. Node 20 ships npm 10.x which has no OIDC
      # publish-auth path — it would fail with ENEEDAUTH at the npm publish
      # step. Cursor Bugbot High caught this on R0; see PR #36.
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      # actions/setup-node writes `//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}`
      # to the .npmrc at ${NPM_CONFIG_USERCONFIG} (= /home/runner/work/_temp/.npmrc),
      # NOT to ~/.npmrc. With NODE_AUTH_TOKEN unset (Trusted Publishing), that line
      # expands to an empty `_authToken=` value which npm interprets as "auth already
      # configured" and SKIPS the OIDC token exchange — publish then fails with a 404
      # because no auth header is sent. Stripping the stale auth line lets the OIDC
      # path activate. See actions/setup-node#1551.
      #
      # Target ${NPM_CONFIG_USERCONFIG} (the file npm actually reads) — NOT
      # ${HOME}/.npmrc which the R1 fix on PR #36 mistakenly stripped. v0.3.0
      # publish failed with E404 because of that file-path mismatch; v0.3.1 R2
      # corrected the path.
      #
      # Debug output redacts any _authToken value via sed so secrets cannot leak
      # to CI logs even if NPM_TOKEN were ever reintroduced (CodeRabbit Major on
      # R2). GitHub Actions auto-masks known secrets, but defense-in-depth keeps
      # the redaction explicit at the workflow level.
      - name: Strip stale _authToken line from setup-node's .npmrc (so OIDC activates)
        run: |
          set -euo pipefail
          NPMRC="${NPM_CONFIG_USERCONFIG}"
          if [ -f "${NPMRC}" ]; then
            echo "--- pre-strip .npmrc (${NPMRC}) ---"
            sed -E 's#(//registry\.npmjs\.org/:_authToken=).*#\1[REDACTED]#' "${NPMRC}" || true
            sed -i.bak '/^\/\/registry\.npmjs\.org\/:_authToken=/d' "${NPMRC}"
            rm -f "${NPMRC}.bak"
            echo "--- post-strip .npmrc (${NPMRC}) ---"
            sed -E 's#(//registry\.npmjs\.org/:_authToken=).*#\1[REDACTED]#' "${NPMRC}" || true
          else
            echo "::warning::Expected .npmrc not found at ${NPMRC}"
          fi

      - run: npm ci

      - run: npm test

      - run: npm audit --audit-level=high

      - run: npm pack --dry-run

      # Trusted Publishing via GitHub Actions OIDC (closes #7).
      # No NODE_AUTH_TOKEN — npm authenticates via the OIDC token requested by the
      # `--provenance` flag against the workflow's `id-token: write` permission.
      # See https://docs.npmjs.com/trusted-publishers
      #
      # PREREQUISITE: trackly-cli's npm package settings must list
      #   org=trackly-app, repo=trackly-cli, workflow=publish.yml
      # as a Trusted Publisher. Configured 2026-05-27 via npmjs.com → Package
      # Settings → Publishing access → Add trusted publisher.
      #
      # `--provenance` still writes the sigstore attestation to the npm registry
      # (same SLSA v1 provenance statements we've shipped since v0.2.3).
      - name: Publish to npm (with provenance via Trusted Publisher OIDC)
        id: npm_publish
        run: |
          # GitHub Actions' default shell is `bash --noprofile --norc -eo pipefail {0}`,
          # so `set -e` is ACTIVE implicitly — any non-zero command aborts the step unless
          # its exit is tested. `set -u` below adds nounset but does NOT disable errexit.
          # We need `npm publish` to be able to fail (EPUBLISHCONFLICT on already-published
          # re-runs) without aborting the step, so we capture its exit via `|| PUBLISH_EXIT=$?`
          # — the `||` branch suppresses errexit for exactly that command.
          # (Finding by opus-1m + Cursor Bugbot on dd04c6c: bare `npm publish` + `PUBLISH_EXIT=$?`
          # on the next line was unreachable because -e killed the step before the capture.)
          set -u
          VERSION="$(node -p 'require("./package.json").version')"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

          PUBLISH_LOG="$(mktemp)"
          PUBLISH_EXIT=0
          npm publish --access public --provenance >"${PUBLISH_LOG}" 2>&1 || PUBLISH_EXIT=$?
          cat "${PUBLISH_LOG}"
          if [ "${PUBLISH_EXIT}" -eq 0 ]; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          else
            # npm's canonical "version already published" signals — any of these means
            # the current version is already on npm and the failure is benign.
            # (EPUBLISHCONFLICT is the modern code; the human-readable string covers
            # older npm versions and various provenance-error phrasings.)
            if grep -qE 'EPUBLISHCONFLICT|cannot publish over|You cannot publish over the previously published versions' "${PUBLISH_LOG}"; then
              echo "Version ${VERSION} already published to npm — skipping publish step"
              echo "published=false" >> "$GITHUB_OUTPUT"
              echo "already_published=true" >> "$GITHUB_OUTPUT"
            else
              echo "::error::npm publish failed with exit ${PUBLISH_EXIT} (non-conflict error)"
              exit "${PUBLISH_EXIT}"
            fi
          fi

      # Post-publish attestation gate. Runs on BOTH paths for the CURRENT version so a
      # partial upload (publish succeeded, attestation didn't land) can't silently ship an
      # unattested tarball on retry.
      #
      # This intentionally fails the workflow for every version ≥ 0.2.3 that lacks attestations.
      # If a pre-0.2.3 version ever needs re-republishing, temporarily skip this step — do NOT
      # weaken the gate for new releases.
      - name: Verify npm attestations (post-publish)
        run: |
          # No `set -e` / `pipefail`: a transient `npm view` failure inside the retry loop
          # must fall through to the next iteration, not kill the workflow. The final exit
          # status is controlled explicitly below.
          set -u
          VERSION="${{ steps.npm_publish.outputs.version }}"
          # Give the registry up to ~30s (3 × 10s) for the attestation to propagate after publish.
          for i in 1 2 3; do
            # `|| true` prevents pipefail-like aborts if npm view transient-fails; grep -q
            # then returns non-zero and we fall through to the retry.
            ATTESTATIONS="$(npm view "trackly-cli@${VERSION}" dist.attestations --json 2>/dev/null || true)"
            if echo "${ATTESTATIONS}" | grep -q '"url"'; then
              echo "✓ Provenance attestations found for trackly-cli@${VERSION}"
              exit 0
            fi
            echo "Attestations not yet visible; waiting 10s (attempt ${i}/3)..."
            sleep 10
          done
          echo "::error::No provenance attestations visible for trackly-cli@${VERSION}"
          echo "::error::If the publish step reported success, the provenance upload failed silently."
          echo "::error::If the version was already on npm without provenance (historical pre-0.2.3 re-runs), update this workflow to temporarily bypass."
          exit 1

      # Pinned to a specific mcp-publisher release + verified SHA256.
      # Previously pulled `releases/latest` piped straight to `tar xz`, which ran any
      # upstream-compromised binary inside this workflow (OIDC token + NPM_TOKEN in scope).
      # To upgrade: update MCP_PUBLISHER_VERSION, fetch the matching line from
      #   https://github.com/modelcontextprotocol/registry/releases/download/v<version>/registry_<version>_checksums.txt
      # and update MCP_PUBLISHER_SHA256_LINUX_AMD64.
      - name: Install mcp-publisher (pinned + SHA256-verified)
        env:
          MCP_PUBLISHER_VERSION: v1.7.8
          MCP_PUBLISHER_SHA256_LINUX_AMD64: 48230dbec85bd88a0d42977ef533cddda23235f0db4331b9263ce53b432cb75c
        run: |
          set -euo pipefail
          # Runner is ubuntu-latest → linux/amd64. Fail loud if that ever changes.
          if [ "$(uname -s)-$(uname -m)" != "Linux-x86_64" ]; then
            echo "::error::mcp-publisher pin only covers linux/amd64; runner is $(uname -s)-$(uname -m)"
            exit 1
          fi
          URL="https://github.com/modelcontextprotocol/registry/releases/download/${MCP_PUBLISHER_VERSION}/mcp-publisher_linux_amd64.tar.gz"
          curl -fsSL --retry 3 -o mcp-publisher.tar.gz "$URL"
          echo "${MCP_PUBLISHER_SHA256_LINUX_AMD64}  mcp-publisher.tar.gz" | sha256sum -c -
          tar xzf mcp-publisher.tar.gz mcp-publisher
          rm mcp-publisher.tar.gz

      - name: Authenticate to MCP Registry
        run: ./mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        run: ./mcp-publisher publish
