name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  claude-review:
    # Gate: only run on PRs AUTHORED by trusted users. This job checks out PR code
    # AFTER AWS credentials are configured, so we must pin the trust check to the PR
    # AUTHOR (`pull_request.user.login`), NOT the event actor (`github.actor`).
    #
    # The difference matters: if an untrusted user opens a PR and Kevin later pushes to
    # that branch (rare, but possible with branch-permission grants), `github.actor`
    # would become `kevinastuhuaman` and satisfy an actor-based gate — while the PR's
    # code (including workflow-affecting files in older history) was authored by the
    # untrusted user. Using `pull_request.user.login` ensures the gate fails in that
    # scenario because the ORIGINAL author remains untrusted.
    #
    # (CodeRabbit Critical finding on PR #21.)
    if: |
      github.event.pull_request.user.login == 'kevinastuhuaman' ||
      github.event.pull_request.author_association == 'OWNER' ||
      github.event.pull_request.author_association == 'MEMBER' ||
      github.event.pull_request.author_association == 'COLLABORATOR'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          fetch-depth: 1

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@6e2bd52842c65e914eba5c8badd17560bd26b5de # v1
        with:
          use_bedrock: "true"
          plugin_marketplaces: |
            https://github.com/anthropics/claude-code.git
          plugins: |
            code-review@claude-code-plugins
          prompt: '/code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }}'
          claude_args: '--model us.anthropic.claude-opus-4-6-v1'
