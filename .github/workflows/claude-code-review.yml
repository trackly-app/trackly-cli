name: Claude Code Review

# Posts severity-ranked INLINE review comments on every PR — a SINGLE-PASS,
# high-recall design.
#
# WHY (2026-07-01 rewrite): this workflow previously ran the official
# `code-review` PLUGIN on Sonnet 4.6. That plugin is precision-gated
# ("we only want HIGH SIGNAL issues" + a validation/filter pass that deletes
# anything not compile-breaking), so on iterated PRs it posted only a terse
# "No issues found." while fanning out ~10 subagents per run (x5 pushes/PR) —
# high token/rate-limit burn, near-zero surfaced value. This reverts to the
# hardened single-pass direct review pattern (mirrored from TracklyMac
# #239, itself revived from an earlier direct-review design) that produced
# valuable P1/P2/P3 feedback before the plugin migration, upgraded to
# Sonnet 5, and keeps the jimmy->berkeley token failover.
#
# Auth: Claude Max-plan subscription via CLAUDE_CODE_OAUTH_TOKEN (+ _FALLBACK),
#   stored as repository secrets for this workflow.
#   ANTHROPIC_API_KEY nulled so the token wins.
# Model: Opus 4.8 (claude-opus-4-8) primary with a Sonnet 5 (claude-sonnet-5)
#   fallback, so an overloaded/unavailable Opus still posts a review. The pair
#   is set once via the CLAUDE_REVIEW_MODEL / CLAUDE_REVIEW_FALLBACK_MODEL job
#   env knobs (Kevin's choice 2026-07-16 — the May Opus quality bar).
# Action pin (v3, 2026-07-16): bumped to v1.0.176. v1.0.162 MASKED a turn-1 SDK
#   failure (`is_error:true` under a `success` subtype) as step SUCCESS, so the
#   jimmy->berkeley failover never fired and reviews went silently empty since
#   July 1. v1.0.172 fails the step on is_error:true (failover works again);
#   v1.0.176 is current.
# Identity: posts as github-actions[bot] (github_token is passed, which bypasses
#   the Claude App-token exchange). The comment body is branded so it is clearly
#   Claude's review. Restoring the "Claude" avatar would require dropping
#   github_token (unvalidated; the App may lack the needed PR-comment scopes) —
#   intentionally not done.
# Security: the diff is precomputed in a trusted step and injected INLINE into
#   the prompt. Claude gets only the inline-comment MCP tool; repo file-reading,
#   shell, git, edit/write, and web tools stay disallowed. Large diffs are capped
#   honestly as PARTIAL coverage instead of being persisted for model reads. The
#   review posts via direct GitHub REST API calls + the inline-comment MCP tool
#   (no runtime `gh` install needed).
# Hardened (/ce-code-review pass): no-SIGPIPE diff truncation, randomized
#   GITHUB_ENV delimiter, has_diff gate + empty-diff guard, precompute
#   continue-on-error, and a visible PR notice when review can't run (so a
#   green check is never mistaken for "reviewed clean").
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  claude-review:
    # Fork guard + draft skip: repository secrets are unavailable to fork code,
    # and draft PRs skip to save quota.
    # trackly-cli is PUBLIC — gate to trusted PR authors (association) AND
    # same-repo head. Do NOT hardcode a personal login (stale kevinastuhuaman gate removed).
    if: |
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      (github.event.pull_request.author_association == 'OWNER' ||
       github.event.pull_request.author_association == 'MEMBER' ||
       github.event.pull_request.author_association == 'COLLABORATOR')
    # 90 min: primary(40) + fallback(40) each budgeted; the job cap must exceed
    # both plus checkout/precompute so a hung primary still leaves the fallback
    # its full window to post.
    timeout-minutes: 90
    runs-on: ubuntu-latest
    env:
      API_FORCE_IDLE_TIMEOUT: "1"
      # Model pair (Kevin's choice 2026-07-16): Opus 4.8 primary, Sonnet 5
      # fallback — the May-quality bar. Both review steps reference these so the
      # pair is changed in exactly one place.
      CLAUDE_REVIEW_MODEL: claude-opus-4-8
      CLAUDE_REVIEW_FALLBACK_MODEL: claude-sonnet-5
    permissions:
      contents: read
      pull-requests: write
      issues: write
      # REQUIRED even with claude_code_oauth_token: the action fetches a GitHub
      # OIDC token during setup. Posting still uses the job's github_token.
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # PR HEAD sha (not the synthetic merge commit) so diff line numbers
          # match the head the inline-comment API posts against.
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      # Skip the review when this PR edits the review workflow itself — a
      # workflow change can't be trusted/validated until it's on the default
      # branch, and this avoids running edited secret-bearing workflow code from
      # a PR head. --name-status -M so a RENAME of the workflow is caught.
      - name: Check Claude review workflow self-change
        id: review-workflow
        shell: bash
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          set -euo pipefail
          # Fail-safe: if the base-ref fetch or merge-base can't be established,
          # treat the workflow as self-changed (skip) rather than risk an
          # incomplete changed-file list bypassing the self-change guard.
          if ! git fetch origin "$BASE_REF"; then
            echo "Failed to fetch origin/${BASE_REF}; treating workflow as self-changed (fail-safe skip)."
            CHANGED_FILES=".github/workflows/claude-code-review.yml"
          elif MERGE_BASE="$(git merge-base "origin/${BASE_REF}" HEAD 2>/dev/null)"; then
            CHANGED_FILES="$(git diff --name-status -M "$MERGE_BASE" HEAD | cut -f2- | tr '\t' '\n')"
          else
            echo "No merge base with origin/${BASE_REF}; treating workflow as self-changed (fail-safe skip)."
            CHANGED_FILES=".github/workflows/claude-code-review.yml"
          fi
          if printf '%s\n' "$CHANGED_FILES" | grep -Fxq '.github/workflows/claude-code-review.yml'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Claude review workflow changed in this PR; skipping until it is on the default branch."
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Post PR notice when Claude workflow self-changed
        if: steps.review-workflow.outputs.changed == 'true'
        shell: bash
        env:
          GH_TOKEN_POST: ${{ github.token }}
        run: |
          set -uo pipefail
          echo "::warning title=Claude review skipped::This PR changes the Claude review workflow, so automated Claude review is skipped until the workflow lands on the default branch. Use compensating structured review before relying on this gate."
          BODY="## 🔵 Claude Code Review"$'\n\n'"⚠️ Automated review skipped because this PR changes the Claude review workflow. This required check is NOT an approval and NOT a clean review result. Use compensating structured review before relying on this gate."
          python3 -c 'import json,sys;print(json.dumps({"body":sys.argv[1]}))' "$BODY" > "$RUNNER_TEMP/cr_self_change_notice.json" || { echo "::warning::could not build self-change notice body"; exit 0; }
          curl -sS --fail -X POST             -H "Authorization: Bearer ${GH_TOKEN_POST}"             -H "Accept: application/vnd.github+json"             "https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments"             -d @"$RUNNER_TEMP/cr_self_change_notice.json" >/dev/null             && echo "Posted self-change review-skip notice to PR."             || echo "::warning::Failed to post self-change review-skip notice to the PR."

      # Precompute the diff in a trusted step and inject it DIRECTLY into the
      # prompt (via GITHUB_ENV). Claude is then given no filesystem/shell tools,
      # so prompt-injected PR content cannot read other runner state. The diff
      # is data in the prompt, not a file Claude must fetch. Output is capped
      # to bound the prompt.
      - name: Precompute PR diff
        id: precompute
        # continue-on-error: a diff-compute hiccup must not hard-fail the job
        # (review is non-blocking). Review steps gate on the has_diff output and
        # the tail steps surface any miss, so a failure here degrades to a
        # visible no-review notice, never a bare red check. (Reliability.)
        continue-on-error: true
        if: steps.review-workflow.outputs.changed != 'true'
        shell: bash
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -uo pipefail
          # Fetch the base HERE (not only in the self-change step) so BASE
          # resolves regardless of step ordering / checkout refspec. (Correctness.)
          git fetch --no-tags origin "$BASE_REF" >/dev/null 2>&1 || true
          BASE="origin/${BASE_REF}"
          git rev-parse --verify "$BASE" >/dev/null 2>&1 || BASE="$BASE_SHA"
          FILES="$(git diff --name-only "${BASE}...HEAD" || true)"
          # Write the diff to a FILE (not a shell var) so a pathologically large
          # PR can't exhaust runner memory, then read back only the capped
          # prefix. Using `head -c` on a FILE also avoids the pipe-SIGPIPE
          # that fails `git diff | head -c` under pipefail on >cap PRs.
          # (CodeRabbit L140 + Correctness P1.)
          # 100 KB cap: the whole prompt (template + diff) travels as ONE env
          # string, and Linux MAX_ARG_STRLEN caps a single env string at ~128 KB.
          # 200 KB broke the action on large-diff PRs ("Argument list too long").
          # (Codex L134.)
          MAXLEN=100000
          DIFF_FILE="${RUNNER_TEMP:-/tmp}/claude-review.diff"
          git diff -U3 "${BASE}...HEAD" > "$DIFF_FILE" 2>/dev/null || true
          BYTES="$(wc -c < "$DIFF_FILE" | tr -d ' ')"
          # Empty diff for real changes => don't let the model post a false LGTM.
          if [ "${BYTES:-0}" -eq 0 ]; then
            echo "has_diff=false" >> "$GITHUB_OUTPUT"
            echo "::warning title=No diff::Empty diff (files: ${FILES:-none}); skipping review to avoid a false LGTM."
            exit 0
          fi
          if [ "$BYTES" -gt "$MAXLEN" ]; then
            TRUNC_NOTE="[NOTE: diff truncated at ${MAXLEN} bytes - coverage is PARTIAL; state that explicitly in the verdict and do not claim full coverage.]"
            DIFF="$(printf '%s\n%s' "$(head -c "$MAXLEN" "$DIFF_FILE")" "$TRUNC_NOTE")"
            echo "::warning title=Diff truncated::PR diff exceeds ${MAXLEN} bytes; inline copy truncated."
          else
            DIFF="$(cat "$DIFF_FILE")"
          fi
          echo "Changed files:"; printf '%s\n' "$FILES"
          # Randomized heredoc delimiter: untrusted PR content containing a
          # FIXED sentinel could otherwise close the GITHUB_ENV value early and
          # inject env vars into the credentialed step. (Security P2.)
          DELIM="__CR_$(openssl rand -hex 12 2>/dev/null || echo "${RANDOM}${RANDOM}${GITHUB_RUN_ID:-x}")__"
          # Gate has_diff=true on a SUCCESSFUL env export — a partial/failed
          # append must not let the review run on an empty prompt and post a
          # false clean verdict. (CodeRabbit L164.)
          if {
            echo "REVIEW_FILES<<${DELIM}"
            printf '%s\n' "$FILES"
            echo "${DELIM}"
            echo "REVIEW_DIFF<<${DELIM}"
            printf '%s\n' "$DIFF"
            echo "${DELIM}"
          } >> "$GITHUB_ENV"; then
            echo "has_diff=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_diff=false" >> "$GITHUB_OUTPUT"
            echo "::warning title=Diff export failed::Could not export review diff to GITHUB_ENV; skipping review."
            exit 0
          fi

      # PRIMARY review — jimmygregorio token (CLAUDE_CODE_OAUTH_TOKEN). If this
      # account fails (quota, auth, model, or action failure),
      # the step fails under continue-on-error and the FALLBACK step runs on the
      # berkeley token so reviews don't stop.
      - name: Run Claude Code Review (primary)
        if: >-
          steps.review-workflow.outputs.changed != 'true' &&
          steps.precompute.outputs.has_diff == 'true'
        id: claude-review
        continue-on-error: true
        timeout-minutes: 40
        uses: anthropics/claude-code-action@700e7f8316990de46bed556429765647af760efc # v1.0.176
        env:
          ANTHROPIC_API_KEY: ""
        with:
          settings: |
            {"env": {"API_FORCE_IDLE_TIMEOUT": "1"}}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Post with the job's own read-scoped GITHUB_TOKEN (contents:read +
          # pull-requests/issues: write) rather than the action's default
          # contents:write App token. Caps tool-escape blast radius.
          github_token: ${{ github.token }}
          # Post inline comments immediately instead of buffering + classifying
          # them post-session. Classification is a silent no-op under OAuth, and
          # its buffer has leaked findings across PRs on stateful runners — set
          # false so every finding lands on THIS PR.
          classify_inline_comments: "false"
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            You are reviewing a pull request for trackly-cli — a Node.js CLI and
            MCP server for AI-agent job tracking (search, apply, track). The PR diff is provided INLINE below. You have no repo
            file-reading, Bash/git/Edit/Write/web tools. Review only the inline
            diff; do not claim full coverage if it is truncated. Anchor every
            inline comment to a line that appears in the inline diff map.

            Report findings with HIGH RECALL. Surface every genuine issue you see,
            including lower-confidence ones — tag each with a severity label
            instead of silently dropping it. Do NOT self-censor to "only critical"
            issues; the severity tag is how the reader triages. Only skip pure
            formatting/style nits that have no behavioral impact.

            Severity labels:
              🔴 P1 — must fix before merge (bug, security, regression, data loss)
              🟡 P2 — should fix (missing test, risky pattern, perf cliff, fragile logic)
              🟢 P3 — worth considering (clarity, naming, minor edge case)

            Focus areas (priority order):
            1. Correctness / logic bugs (CLI arg parsing, async/await, error
               propagation, exit codes, MCP tool contract mismatches)
            2. Security (credential/token handling, secret leakage in logs/output,
               unsafe shell/exec, path traversal, SSRF via user-supplied URLs)
            3. Data-loss or irreversible-op risk (destructive commands, overwrite
               without confirmation, corrupt local state)
            4. Missing tests for new CLI/MCP behavior
            5. Performance (unbounded pagination, N+1 API calls, large JSON parse)
            6. Docs/skills drift (SKILL.md / MCP tool schemas vs implementation)
            For workflow/config changes, also check that review gates can't
            silently no-op.

            STEP 1 - Build the changed-line map FIRST from the inline diff.
            Map each changed file to its ADDED/CHANGED (right-side, `+`) line
            numbers, and ALSO track DELETED (left-side, `-`) lines so you catch
            regressions introduced by removed code (dropped guards, error
            handling, or cleanup) - a review that only looks at added lines
            misses deletion bugs. EVERY inline comment MUST target a (file,
            line) pair that appears in that map - either an ADDED/CHANGED
            right-side line, or, for a finding about removed code, a DELETED
            left-side line posted with the tool's side:LEFT / old-line
            parameter. The GitHub API rejects (HTTP 422 "could not be resolved")
            any comment whose path+line is not part of the PR diff, and that is
            the #1 cause of a run posting nothing. If the inline diff includes a
            truncation NOTE, state PARTIAL coverage explicitly and do not claim
            full coverage.

            Changed files:
            ${{ env.REVIEW_FILES }}

            Unified diff (inline copy):
            ```diff
            ${{ env.REVIEW_DIFF }}
            ```

            STEP 2 — Post each finding as an inline comment using
            `mcp__github_inline_comment__create_inline_comment` with
            `confirmed: true` and ALWAYS
            `commit_id: ${{ github.event.pull_request.head.sha }}` (the diff map
            was built from that exact SHA; pinning prevents a mid-run push from
            anchoring stale findings or failing with 422). Never comment on a
            line outside the STEP 1 map; if a finding concerns code outside the
            diff, describe it in the verdict with the path in backticks instead of
            anchoring there. Post ONE comment per unique issue.

            STEP 3 — Post the overall verdict as ONE inline comment, anchored to
            the FIRST ADDED/CHANGED line of the first file (if the PR is
            deletion-only, anchor to a DELETED left-side line; if neither is
            anchorable, emit the verdict to the job log prefixed `VERDICT:` so the
            run is never silently empty). Begin the verdict comment with this exact
            header line:

            ## 🔵 Claude Code Review

            Then give the counts of 🔴/🟡/🟢 and a one-line recommendation
            (APPROVE / REQUEST_CHANGES / COMMENT). If there are zero findings
            and the review input was not truncated, still post this verdict
            comment saying "LGTM — no issues found (checked correctness,
            security, data-loss, tests, performance)." If the review input
            contains `[NOTE: diff truncated`, say "Partial LGTM — no issues
            found in the visible diff (coverage was partial because the diff
            was truncated)" and do not claim full coverage.

            STEP 4 — ALSO end your run with a final text message containing the
            COMPLETE review: the `## 🔵 Claude Code Review` header, the 🔴/🟡/🟢
            counts, the recommendation, and every finding as a
            `path:line — severity — finding` line. This is a REQUIRED backstop —
            if inline anchoring fails for every finding, a downstream step posts
            this final text so the review is never lost. Emitting it is free when
            inline posting also succeeds.
          claude_args: |
            --model ${{ env.CLAUDE_REVIEW_MODEL }}
            --fallback-model ${{ env.CLAUDE_REVIEW_FALLBACK_MODEL }}
            --tools "mcp__github_inline_comment__create_inline_comment"
            --allowedTools "mcp__github_inline_comment__create_inline_comment"
            --disallowedTools "Read,Grep,Glob,Bash,Edit,Write,WebFetch,WebSearch,NotebookEdit"

      # FALLBACK review — berkeley token (CLAUDE_CODE_OAUTH_TOKEN_FALLBACK). Runs
      # ONLY when the primary step did not succeed (e.g. jimmy hit its session
      # limit). Identical config, different account = a second auth path so a
      # primary failure doesn't leave the PR unreviewed.
      - name: Run Claude Code Review (fallback)
        if: >-
          steps.review-workflow.outputs.changed != 'true' &&
          steps.precompute.outputs.has_diff == 'true' &&
          steps.claude-review.outcome != 'success'
        id: claude-review-fallback
        continue-on-error: true
        timeout-minutes: 40
        uses: anthropics/claude-code-action@700e7f8316990de46bed556429765647af760efc # v1.0.176
        env:
          ANTHROPIC_API_KEY: ""
        with:
          settings: |
            {"env": {"API_FORCE_IDLE_TIMEOUT": "1"}}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN_FALLBACK }}
          github_token: ${{ github.token }}
          # Post inline comments immediately instead of buffering + classifying
          # them post-session. Classification is a silent no-op under OAuth, and
          # its buffer has leaked findings across PRs on stateful runners — set
          # false so every finding lands on THIS PR.
          classify_inline_comments: "false"
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            You are reviewing a pull request for trackly-cli — a Node.js CLI and
            MCP server for AI-agent job tracking (search, apply, track). The PR diff is provided INLINE below. You have no repo
            file-reading, Bash/git/Edit/Write/web tools. Review only the inline
            diff; do not claim full coverage if it is truncated. Anchor every
            inline comment to a line that appears in the inline diff map.

            Report findings with HIGH RECALL. Surface every genuine issue you see,
            including lower-confidence ones — tag each with a severity label
            instead of silently dropping it. Do NOT self-censor to "only critical"
            issues; the severity tag is how the reader triages. Only skip pure
            formatting/style nits that have no behavioral impact.

            Severity labels:
              🔴 P1 — must fix before merge (bug, security, regression, data loss)
              🟡 P2 — should fix (missing test, risky pattern, perf cliff, fragile logic)
              🟢 P3 — worth considering (clarity, naming, minor edge case)

            Focus areas (priority order):
            1. Correctness / logic bugs (CLI arg parsing, async/await, error
               propagation, exit codes, MCP tool contract mismatches)
            2. Security (credential/token handling, secret leakage in logs/output,
               unsafe shell/exec, path traversal, SSRF via user-supplied URLs)
            3. Data-loss or irreversible-op risk (destructive commands, overwrite
               without confirmation, corrupt local state)
            4. Missing tests for new CLI/MCP behavior
            5. Performance (unbounded pagination, N+1 API calls, large JSON parse)
            6. Docs/skills drift (SKILL.md / MCP tool schemas vs implementation)
            For workflow/config changes, also check that review gates can't
            silently no-op.

            STEP 1 - Build the changed-line map FIRST from the inline diff.
            Map each changed file to its ADDED/CHANGED (right-side, `+`) line
            numbers, and ALSO track DELETED (left-side, `-`) lines so you catch
            regressions introduced by removed code (dropped guards, error
            handling, or cleanup) - a review that only looks at added lines
            misses deletion bugs. EVERY inline comment MUST target a (file,
            line) pair that appears in that map - either an ADDED/CHANGED
            right-side line, or, for a finding about removed code, a DELETED
            left-side line posted with the tool's side:LEFT / old-line
            parameter. The GitHub API rejects (HTTP 422 "could not be resolved")
            any comment whose path+line is not part of the PR diff, and that is
            the #1 cause of a run posting nothing. If the inline diff includes a
            truncation NOTE, state PARTIAL coverage explicitly and do not claim
            full coverage.

            Changed files:
            ${{ env.REVIEW_FILES }}

            Unified diff (inline copy):
            ```diff
            ${{ env.REVIEW_DIFF }}
            ```

            STEP 2 — Post each finding as an inline comment using
            `mcp__github_inline_comment__create_inline_comment` with
            `confirmed: true` and ALWAYS
            `commit_id: ${{ github.event.pull_request.head.sha }}` (the diff map
            was built from that exact SHA; pinning prevents a mid-run push from
            anchoring stale findings or failing with 422). Never comment on a
            line outside the STEP 1 map; if a finding concerns code outside the
            diff, describe it in the verdict with the path in backticks instead of
            anchoring there. Post ONE comment per unique issue.

            STEP 3 — Post the overall verdict as ONE inline comment, anchored to
            the FIRST ADDED/CHANGED line of the first file (if the PR is
            deletion-only, anchor to a DELETED left-side line; if neither is
            anchorable, emit the verdict to the job log prefixed `VERDICT:` so the
            run is never silently empty). Begin the verdict comment with this exact
            header line:

            ## 🔵 Claude Code Review

            Then give the counts of 🔴/🟡/🟢 and a one-line recommendation
            (APPROVE / REQUEST_CHANGES / COMMENT). If there are zero findings
            and the review input was not truncated, still post this verdict
            comment saying "LGTM — no issues found (checked correctness,
            security, data-loss, tests, performance)." If the review input
            contains `[NOTE: diff truncated`, say "Partial LGTM — no issues
            found in the visible diff (coverage was partial because the diff
            was truncated)" and do not claim full coverage.

            STEP 4 — ALSO end your run with a final text message containing the
            COMPLETE review: the `## 🔵 Claude Code Review` header, the 🔴/🟡/🟢
            counts, the recommendation, and every finding as a
            `path:line — severity — finding` line. This is a REQUIRED backstop —
            if inline anchoring fails for every finding, a downstream step posts
            this final text so the review is never lost. Emitting it is free when
            inline posting also succeeds.
          claude_args: |
            --model ${{ env.CLAUDE_REVIEW_FALLBACK_MODEL }}
            --tools "mcp__github_inline_comment__create_inline_comment"
            --allowedTools "mcp__github_inline_comment__create_inline_comment"
            --disallowedTools "Read,Grep,Glob,Bash,Edit,Write,WebFetch,WebSearch,NotebookEdit"

      # Detectability backstop (logs): classify the outcome so a silent
      # no-review is visible in the run summary. Distinguishes precompute-miss
      # from token-failure so the message is never misleading. (Reliability.)
      - name: Report Claude review status
        if: always() && steps.review-workflow.outputs.changed != 'true'
        shell: bash
        run: |
          if [ "${{ steps.precompute.outputs.has_diff }}" != "true" ]; then
            echo "::warning title=Claude review skipped::No diff computed (precompute outcome=${{ steps.precompute.outcome }}); no review attempted."
          elif [ "${{ steps.claude-review.outcome }}" = "success" ]; then
            echo "Claude review posted via the primary (jimmygregorio) token."
          elif [ "${{ steps.claude-review-fallback.outcome }}" = "success" ]; then
            echo "::notice title=Claude review used fallback::Primary failed (${{ steps.claude-review.outcome }}); posted via the berkeley fallback token."
          else
            echo "::warning title=Claude review did not post::Both workflow auth attempts failed (primary=${{ steps.claude-review.outcome }}, fallback=${{ steps.claude-review-fallback.outcome }}). Inspect action logs for OAuth token, usage/quota, model availability, or action config. The step now fails loudly on a turn-1 SDK error (v1.0.176), so this is a real failure, not a masked one."
          fi

      # A run-log ::warning:: does NOT surface on the PR conversation, so a
      # no-review run reads as a green "reviewed clean" check. When review could
      # not run, post a VISIBLE non-blocking PR comment so the empty result is
      # never mistaken for an approval. (Adversarial + Security.) Uses the job's
      # own github_token via the REST API (no gh dependency); python3 for safe
      # JSON encoding. Never fails the job.
      - name: Post PR notice if review could not run
        if: >-
          always() && steps.review-workflow.outputs.changed != 'true' &&
          steps.claude-review.outcome != 'success' &&
          steps.claude-review-fallback.outcome != 'success'
        shell: bash
        env:
          GH_TOKEN_POST: ${{ github.token }}
        run: |
          set -uo pipefail
          if [ "${{ steps.precompute.outputs.has_diff }}" != "true" ]; then
            REASON="the PR diff could not be computed"
          else
            REASON="both workflow auth attempts failed"
          fi
          BODY="## 🔵 Claude Code Review"$'\n\n'"⚠️ Automated review could not run - ${REASON}. This is a NON-BLOCKING notice; it is NOT an approval and NOT a clean result. If review auth failed, inspect action logs for OAuth token, usage/quota, model availability, or action config before relying on this gate."
          python3 -c 'import json,sys;print(json.dumps({"body":sys.argv[1]}))' "$BODY" > "$RUNNER_TEMP/cr_notice.json" || { echo "::warning::could not build notice body"; exit 0; }
          curl -sS --fail -X POST \
            -H "Authorization: Bearer ${GH_TOKEN_POST}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" \
            -d @"$RUNNER_TEMP/cr_notice.json" >/dev/null \
            && echo "Posted review-unavailable notice to PR." \
            || echo "::warning::Failed to post review-unavailable notice to the PR."

      # Substance backstop: a review step can SUCCEED yet land NO inline comment
      # (every finding on an unanchorable line, a rename/mode/binary-only diff, or
      # the model summarized in chat instead of anchoring). Rather than post a
      # useless "produced nothing" notice, RECOVER the model's final review text
      # from the action's execution output file and post IT as the review — so a
      # run that really produced a review is never silently lost. Only fall back
      # to a bare notice when no usable text exists. (CodeRabbit L253 + Adversarial.)
      - name: Backstop — post recovered review text if no inline comment landed
        if: >-
          always() && steps.review-workflow.outputs.changed != 'true' &&
          (steps.claude-review.outcome == 'success' ||
           steps.claude-review-fallback.outcome == 'success')
        shell: bash
        env:
          GH_TOKEN_POST: ${{ github.token }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          EXEC_FILE_PRIMARY: ${{ steps.claude-review.outputs.execution_file }}
          EXEC_FILE_FALLBACK: ${{ steps.claude-review-fallback.outputs.execution_file }}
        run: |
          set -uo pipefail
          # Newest-first so freshly-posted head-commit comments are on page 1;
          # count only github-actions[bot] (how this review posts) so other bots'
          # comments don't mask an empty Claude review.
          N="$(curl -sS \
            -H "Authorization: Bearer ${GH_TOKEN_POST}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/comments?sort=created&direction=desc&per_page=100" \
            | python3 -c 'import json,sys,os; h=os.environ["HEAD_SHA"]; d=json.load(sys.stdin); d=d if isinstance(d,list) else []; print(sum(1 for c in d if isinstance(c,dict) and c.get("commit_id")==h and (c.get("user") or {}).get("login")=="github-actions[bot]"))' 2>/dev/null || echo -1)"
          echo "github-actions[bot] inline comments on head ${HEAD_SHA}: ${N}"
          if [ "$N" != "0" ]; then
            echo "Inline review present (${N} comment(s)); no backstop needed."
            exit 0
          fi

          # No inline comment landed. Recover the model's final text from the
          # execution file of whichever review step succeeded. The file may be a
          # JSON array or JSONL (stream-json); `jq -s | flatten(1)` normalizes
          # both, then we take the last result-type text (or last assistant text).
          if [ "${{ steps.claude-review.outcome }}" = "success" ]; then
            EXEC_FILE="$EXEC_FILE_PRIMARY"
          else
            EXEC_FILE="$EXEC_FILE_FALLBACK"
          fi
          REVIEW_TEXT=""
          if [ -n "${EXEC_FILE:-}" ] && [ -f "$EXEC_FILE" ]; then
            REVIEW_TEXT="$(jq -s -r '
              (flatten(1)) as $ev
              | ( [ $ev[] | select(.type=="result") | .result // empty ] | last )
                // ( [ $ev[] | select(.type=="assistant") | .message.content[]? | select(.type=="text") | .text ] | last )
                // ""' "$EXEC_FILE" 2>/dev/null | head -c 60000 || true)"
          fi

          if [ -n "${REVIEW_TEXT//[[:space:]]/}" ]; then
            NOTE="_(backstop — inline anchoring was unavailable, so the model's full review is posted here.)_"
            case "$REVIEW_TEXT" in
              "## 🔵 Claude Code Review"*) BODY="$REVIEW_TEXT"$'\n\n'"$NOTE" ;;
              *) BODY="## 🔵 Claude Code Review"$'\n\n'"$NOTE"$'\n\n'"$REVIEW_TEXT" ;;
            esac
            python3 -c 'import json,sys;print(json.dumps({"body":sys.argv[1]}))' "$BODY" > "$RUNNER_TEMP/cr_backstop.json" || { echo "::warning::could not build backstop body"; exit 0; }
            curl -sS --fail -X POST \
              -H "Authorization: Bearer ${GH_TOKEN_POST}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" \
              -d @"$RUNNER_TEMP/cr_backstop.json" >/dev/null \
              && echo "Posted substantive review via backstop (inline anchoring unavailable)." \
              || echo "::warning::Failed to post backstop review comment."
          else
            echo "::warning title=Empty review::A review step succeeded but posted 0 inline comments and no recoverable text was found in the execution file."
            python3 -c 'import json;print(json.dumps({"body":"## 🔵 Claude Code Review\n\n⚠️ The review ran but produced no inline comment and no recoverable summary text (e.g. a rename/mode/binary-only diff). NON-BLOCKING notice — not an approval. Re-run if line-level review is needed."}))' > "$RUNNER_TEMP/cr_empty.json" || exit 0
            curl -sS --fail -X POST \
              -H "Authorization: Bearer ${GH_TOKEN_POST}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" \
              -d @"$RUNNER_TEMP/cr_empty.json" >/dev/null \
              && echo "Posted empty-review notice to PR." \
              || echo "::warning::Failed to post empty-review notice."
          fi
