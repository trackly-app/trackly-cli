name: Publish MCP Registry

on:
  workflow_dispatch:

jobs:
  publish-mcp:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      # Pinned to commit SHA to prevent supply-chain attacks via tag re-pointing.
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      # Keep in lockstep with .github/workflows/publish.yml — same version, same SHA256.
      - name: Install mcp-publisher (pinned + SHA256-verified)
        env:
          MCP_PUBLISHER_VERSION: v1.7.8
          MCP_PUBLISHER_SHA256_LINUX_AMD64: 48230dbec85bd88a0d42977ef533cddda23235f0db4331b9263ce53b432cb75c
        run: |
          set -euo pipefail
          if [ "$(uname -s)-$(uname -m)" != "Linux-x86_64" ]; then
            echo "::error::mcp-publisher pin only covers linux/amd64; runner is $(uname -s)-$(uname -m)"
            exit 1
          fi
          URL="https://github.com/modelcontextprotocol/registry/releases/download/${MCP_PUBLISHER_VERSION}/mcp-publisher_linux_amd64.tar.gz"
          curl -fsSL --retry 3 -o mcp-publisher.tar.gz "$URL"
          echo "${MCP_PUBLISHER_SHA256_LINUX_AMD64}  mcp-publisher.tar.gz" | sha256sum -c -
          tar xzf mcp-publisher.tar.gz mcp-publisher
          rm mcp-publisher.tar.gz

      - name: Validate server.json
        run: ./mcp-publisher validate

      - name: Authenticate to MCP Registry
        run: ./mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        run: ./mcp-publisher publish
