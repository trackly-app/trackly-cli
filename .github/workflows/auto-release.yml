name: Auto Release

# Creates a GitHub Release whenever package.json version changes on main, so the
# GitHub Releases page stays in sync with npm.
#
# NOTE: this workflow does NOT trigger publishing. The Release/tag it creates use
# GITHUB_TOKEN, which (by GitHub's recursion-prevention rule) does NOT fire downstream
# `release:`/`push:` workflow runs — that's why v0.4.0/v0.4.1 had to be published via a
# manual release recreate. publish.yml now triggers independently on the same
# merge-to-main push (gated to version changes), so publishing is fully automatic.

on:
  push:
    branches: [main]

jobs:
  check-version:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: write

    steps:
      # Pinned to commit SHA to prevent supply-chain attacks via tag re-pointing.
      # Version: v5.x.x (Node 24 runtime — Node 20 actions deprecated June 2 2026).
      # To upgrade, find the desired tag's commit at https://github.com/actions/checkout/tags
      # and update both SHA + `# vX.Y.Z` comment.
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          fetch-depth: 2

      - name: Detect version change
        id: version
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          PREVIOUS=$(git show HEAD~1:package.json 2>/dev/null | node -p "JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).version" 2>/dev/null || echo "")

          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "previous=$PREVIOUS" >> "$GITHUB_OUTPUT"

          if [ "$CURRENT" != "$PREVIOUS" ] && [ -n "$PREVIOUS" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Version changed: $PREVIOUS → $CURRENT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No version change ($CURRENT)"
          fi

      - name: Extract changelog for this version
        if: steps.version.outputs.changed == 'true'
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.current }}"
          # Extract the section for this version from CHANGELOG.md
          NOTES=$(awk "/^## \\[$VERSION\\]/{found=1; next} /^## \\[/{if(found) exit} found{print}" CHANGELOG.md)

          if [ -z "$NOTES" ]; then
            NOTES="Release v$VERSION"
          fi

          # Write to file to avoid escaping issues
          echo "$NOTES" > /tmp/release-notes.md

      - name: Create GitHub Release
        if: steps.version.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.current }}"
          TAG="v$VERSION"

          # Create tag if it doesn't exist
          git tag "$TAG" 2>/dev/null || true
          git push origin "$TAG" 2>/dev/null || true

          # Create release
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file /tmp/release-notes.md \
            --latest
